# K2BR Repeater Bot — CI: lint, tests, dependency audit.
#
# No network services, Discord connections, or SIP endpoints are touched:
# the test suite runs against a sanitized fixture config and fakes/mocks the
# audio + Discord layers. PyNaCl/opus warnings during collection are expected
# and harmless (voice codecs aren't exercised in tests).
#
# The weekly scheduled run exists because several requirements float
# (discord.py>=, aiohttp>=, ...): it catches "an upstream release broke us"
# between pushes instead of at deploy time.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC — weekly float-dependency canary

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Ruff (lint)
        run: ruff check .

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          # Production runs on Windows / Python 3.13 (IocpProactor, Windows
          # socket errno semantics, audioop-lts) — test what we ship on.
          - os: windows-latest
            python-version: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest

  audit:
    # Known-vulnerability scan of the dependency tree. Advisory rather than
    # blocking: an upstream CVE with no released fix shouldn't freeze all
    # development — but it should be loudly visible on every run.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        # PYSEC-2026-3002 (pynacl 1.5.0) is suppressed by ID, NOT ignored
        # wholesale: the fix (1.6.2) is excluded by discord.py's own
        # "PyNaCl<1.6" constraint, so it is unfixable here until upstream
        # relaxes that cap. Suppressing it by ID keeps the job meaningful —
        # any NEW advisory still shows up instead of being lost in a
        # permanently-red run. See the note in requirements.txt.
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2026-3002
